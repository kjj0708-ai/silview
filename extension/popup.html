<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827;
      color: #f9fafb;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1f2937;
    }
    .header img { width: 28px; height: 28px; border-radius: 8px; object-fit: cover; }
    .header-text { flex: 1; }
    .header-text h1 { font-size: 13px; font-weight: 700; }
    .header-text p { font-size: 10px; color: #6b7280; margin-top: 1px; }
    .body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      transition: opacity 0.15s;
      width: 100%;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #1f2937; color: #d1d5db; }
    .btn .icon { font-size: 15px; }
    .hint {
      font-size: 10px;
      color: #4b5563;
      text-align: center;
      padding: 4px 0 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon.png" alt="실뷰" />
    <div class="header-text">
      <h1>실뷰</h1>
      <p>광고 없는 이미지 뷰어·편집</p>
    </div>
  </div>
  <div class="body">
    <button class="btn btn-primary" id="openSilview">
      <span class="icon">🖼</span> 실뷰 열기
    </button>
    <button class="btn btn-secondary" id="openImages">
      <span class="icon">📋</span> 이 페이지 이미지 보기
    </button>
  </div>
  <p class="hint">이미지 우클릭 → "실뷰에서 열기"</p>
  <script src="popup.js"></script>
</body>
</html>
