<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>실뷰</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111827; display: flex; flex-direction: column; }

    .topbar {
      height: 38px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .logo img {
      width: 22px; height: 22px;
      border-radius: 5px;
      object-fit: cover;
    }
    .logo-text {
      font-size: 13px;
      font-weight: 700;
      color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: -0.3px;
    }
    .logo-sub {
      font-size: 9px;
      color: #6b7280;
      font-family: -apple-system, sans-serif;
    }

    .spacer { flex: 1; }

    .btn-app {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-app:hover { background: #1d4ed8; }
    .btn-app svg { width: 12px; height: 12px; }

    .frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #111827;
      color: #6b7280;
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loading.hidden { opacity: 0; }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid #374151;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="spacer"></div>
    <button class="btn-app" id="btnOpenApp">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1v-3M10 2h4m0 0v4m0-4L7 9"/>
      </svg>
      앱으로 열기
    </button>
  </div>

  <div class="frame-wrap">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>실뷰 로딩 중...</span>
    </div>
    <iframe
      id="frame"
      src="https://silview.choshg.com"
      allow="clipboard-write; clipboard-read"
    ></iframe>
  </div>

  <script src="panel.js"></script>
</body>
</html>
